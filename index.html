<!DOCTYPE html>
<!-- CARD CATALOG (FI-066) v0.1.0 scaffold -->
<html lang="en" data-theme="night">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CARD CATALOG · FI-066</title>
<meta name="description" content="Your personal library. Books cataloged on virtual index cards.">
<style>
/* =================================================================
   CARD CATALOG (FI-066)
   Section index:
     1. Tokens and themes
     2. Base and layout
     3. Side menu
     4. Cabinet and drawers
     5. Drawer interior (empty state)
     6. Motion and accessibility
   ================================================================= */

/* ---- 1. Tokens and themes ---------------------------------------- */
:root {
  --font-type: "Courier Prime", "Courier New", Courier, monospace; /* typewriter; embedded subset planned for v1.0 */
  --font-label: Georgia, "Times New Roman", serif;                 /* brass label frames, UI serif */

  --oak-hi: #7d5732;
  --oak-lo: #543a20;
  --oak-edge: #3a2814;
  --brass: #b8945a;
  --brass-hi: #d9bc85;
  --cardstock: #f2ead8;
  --stamp-red: #a3282e;
}

/* Night (default): the reading room after hours. */
:root[data-theme="night"] {
  --bg: #14100c;
  --bg-glow: radial-gradient(ellipse 70% 55% at 50% 18%, rgba(72, 129, 96, 0.16), transparent 70%),
             radial-gradient(ellipse 90% 70% at 50% 100%, rgba(0,0,0,0.5), transparent 60%);
  --ink: #e9e2d2;
  --ink-dim: #b0a790;
  --panel: #1d1712;
  --panel-edge: #33291d;
  --lamp: #79b894;
  --focus: #d9bc85;
}

/* Day: the sunlit reading room. */
:root[data-theme="day"] {
  --bg: #e8dfcc;
  --bg-glow: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(255, 250, 235, 0.85), transparent 70%);
  --ink: #241c12;
  --ink-dim: #5c5240;
  --panel: #f2ead8;
  --panel-edge: #c9bda0;
  --lamp: #1e4d38;
  --focus: #1e4d38;
}

/* High Contrast: textures flattened, decoration suppressed. */
:root[data-theme="contrast"] {
  --bg: #000000;
  --bg-glow: none;
  --ink: #ffffff;
  --ink-dim: #d0d0d0;
  --panel: #000000;
  --panel-edge: #ffffff;
  --oak-hi: #111111;
  --oak-lo: #111111;
  --oak-edge: #ffffff;
  --brass: #ffffff;
  --brass-hi: #ffffff;
  --cardstock: #000000;
  --lamp: #ffff66;
  --focus: #ffff66;
}

/* ---- 2. Base and layout ------------------------------------------ */
* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body {
  background: var(--bg);
  background-image: var(--bg-glow);
  background-attachment: fixed;
  color: var(--ink);
  font-family: var(--font-type);
  display: flex;
  min-height: 100vh;
}
:focus-visible { outline: 3px solid var(--focus); outline-offset: 2px; }

main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: clamp(1rem, 4vw, 3rem);
}

header.masthead { text-align: center; margin-bottom: clamp(1rem, 3vh, 2.5rem); }
header.masthead h1 {
  font-family: var(--font-type);
  font-weight: 700;
  letter-spacing: 0.35em;
  font-size: clamp(1.1rem, 3.5vw, 1.8rem);
  margin: 0;
}
header.masthead .fi {
  font-family: var(--font-label);
  font-variant: small-caps;
  letter-spacing: 0.2em;
  color: var(--ink-dim);
  font-size: 0.8rem;
}

/* ---- 3. Side menu ------------------------------------------------- */
#menuToggle {
  position: fixed; top: 0.75rem; left: 0.75rem; z-index: 30;
  background: var(--panel); color: var(--ink);
  border: 1px solid var(--panel-edge);
  font-family: var(--font-label); font-variant: small-caps; letter-spacing: 0.1em;
  padding: 0.4rem 0.8rem; cursor: pointer;
}
#sideMenu {
  position: fixed; top: 0; left: 0; bottom: 0; z-index: 20;
  width: min(18rem, 85vw);
  background: var(--panel);
  border-right: 1px solid var(--panel-edge);
  transform: translateX(-100%);
  transition: transform 0.25s ease;
  padding: 3.5rem 1.25rem 1.25rem;
  display: flex; flex-direction: column; gap: 1rem;
  font-size: 0.9rem;
}
#sideMenu.open { transform: translateX(0); }
#sideMenu h2 {
  font-family: var(--font-label); font-variant: small-caps;
  letter-spacing: 0.15em; font-size: 0.85rem;
  color: var(--ink-dim); margin: 0.5rem 0 0.25rem;
}
#sideMenu button, #sideMenu a {
  background: none; border: 1px solid var(--panel-edge); color: var(--ink);
  font-family: inherit; font-size: 0.85rem;
  padding: 0.45rem 0.6rem; cursor: pointer; text-align: left; text-decoration: none;
  display: block; width: 100%;
}
#sideMenu button[aria-pressed="true"] { border-color: var(--focus); color: var(--focus); }
#sideMenu .lot {
  margin-top: auto;
  color: var(--ink-dim); font-size: 0.7rem; letter-spacing: 0.08em;
}

/* ---- 4. Cabinet and drawers --------------------------------------- */
#cabinet {
  width: min(30rem, 92vw);
  background: linear-gradient(160deg, var(--oak-hi), var(--oak-lo));
  border: 3px solid var(--oak-edge);
  border-radius: 4px;
  padding: clamp(0.8rem, 2.5vw, 1.4rem);
  box-shadow: 0 1.5rem 3rem rgba(0,0,0,0.45);
  display: flex; flex-direction: column; gap: clamp(0.5rem, 1.5vw, 0.8rem);
}
.drawer {
  background: linear-gradient(175deg, var(--oak-hi), var(--oak-lo) 85%);
  border: 2px solid var(--oak-edge);
  border-radius: 3px;
  padding: clamp(0.7rem, 2vw, 1rem) 1rem;
  display: flex; align-items: center; gap: 1rem;
  cursor: pointer;
  width: 100%;
  font-family: inherit;
  color: var(--ink);
  transition: transform 0.18s ease;
}
.drawer:hover { transform: translateY(2px) scale(1.005); }
.drawer:active { transform: translateY(4px); }
.drawer .labelframe {
  flex: 1;
  background: var(--cardstock);
  border: 2px solid var(--brass);
  box-shadow: inset 0 0 0 1px var(--brass-hi);
  color: #241c12;
  font-family: var(--font-type);
  font-weight: 700; letter-spacing: 0.25em; text-align: center;
  padding: 0.35rem 0.5rem;
  font-size: clamp(0.75rem, 2.2vw, 0.95rem);
}
:root[data-theme="contrast"] .drawer .labelframe { background: #000; color: #fff; }
.drawer .pull {
  width: 2.4rem; height: 0.9rem;
  background: linear-gradient(180deg, var(--brass-hi), var(--brass));
  border-radius: 0 0 1.2rem 1.2rem;
  border: 1px solid var(--oak-edge);
  flex: none;
}
.drawer.withdrawn { filter: saturate(0.4) brightness(0.85); }
.drawer.withdrawn .labelframe { color: var(--ink-dim); font-weight: 400; }
:root[data-theme="contrast"] .drawer.withdrawn { filter: none; opacity: 0.7; }

/* ---- 5. Drawer interior (empty state for v0.1.0) ------------------ */
#drawerView { display: none; width: min(34rem, 94vw); margin-top: 1.5rem; text-align: center; }
#drawerView.open { display: block; }
#drawerView .interior {
  background: var(--panel);
  border: 2px solid var(--oak-edge);
  padding: 2rem 1.5rem;
}
#drawerView .rod { height: 4px; background: var(--brass); margin: 1.5rem auto 0; width: 60%; border-radius: 2px; }
#drawerView h2 { font-size: 1rem; letter-spacing: 0.3em; margin: 0 0 0.75rem; }
#drawerView p { color: var(--ink-dim); font-size: 0.85rem; line-height: 1.6; margin: 0.3rem 0; }
#drawerView .close {
  margin-top: 1.25rem;
  background: none; border: 1px solid var(--panel-edge); color: var(--ink);
  font-family: inherit; padding: 0.4rem 1rem; cursor: pointer;
}

/* ---- 6. Motion and accessibility ---------------------------------- */
@media (prefers-reduced-motion: reduce) {
  #sideMenu, .drawer { transition: none; }
  .drawer:hover, .drawer:active { transform: none; }
}
.visually-hidden {
  position: absolute; width: 1px; height: 1px;
  margin: -1px; padding: 0; overflow: hidden;
  clip: rect(0 0 0 0); white-space: nowrap; border: 0;
}
</style>
</head>
<body>

<button id="menuToggle" aria-expanded="false" aria-controls="sideMenu">Menu</button>

<nav id="sideMenu" aria-label="Instrument menu">
  <h2>Theme</h2>
  <button data-theme-set="night" aria-pressed="true">Night (reading room after hours)</button>
  <button data-theme-set="day" aria-pressed="false">Day (sunlit reading room)</button>
  <button data-theme-set="contrast" aria-pressed="false">High Contrast</button>

  <h2>Sound</h2>
  <button id="muteToggle" aria-pressed="false">Sound on</button>

  <h2>Catalog</h2>
  <button id="exportBtn">Export catalog (JSON)</button>
  <button id="importBtn">Import catalog (JSON)</button>

  <h2>Feedback</h2>
  <a href="https://github.com/mbparks/CardCatalog/issues" rel="noopener">Report an issue</a>

  <div class="lot">
    CARD STOCK LOT <span id="verLot"></span><br>
    CARD CATALOG · FI-066
  </div>
</nav>

<main>
  <header class="masthead">
    <div class="fi">Field Instrument No. 066</div>
    <h1>CARD CATALOG</h1>
    <div class="fi">Your personal library</div>
  </header>

  <div id="cabinet" role="group" aria-label="Card catalog cabinet">
    <button class="drawer" data-drawer="AUTHOR">
      <span class="labelframe">AUTHOR</span><span class="pull" aria-hidden="true"></span>
    </button>
    <button class="drawer" data-drawer="TITLE">
      <span class="labelframe">TITLE</span><span class="pull" aria-hidden="true"></span>
    </button>
    <button class="drawer" data-drawer="SUBJECT">
      <span class="labelframe">SUBJECT</span><span class="pull" aria-hidden="true"></span>
    </button>
    <button class="drawer withdrawn" data-drawer="WITHDRAWN">
      <span class="labelframe">WITHDRAWN</span><span class="pull" aria-hidden="true"></span>
    </button>
  </div>

  <section id="drawerView" aria-live="polite">
    <div class="interior">
      <h2 id="drawerName"></h2>
      <p>This drawer holds no cards yet.</p>
      <p>Intake begins in v0.2. New accessions will be typed onto cards and filed here.</p>
      <div class="rod" aria-hidden="true"></div>
      <button class="close" id="drawerClose">Close drawer</button>
    </div>
  </section>
</main>

<script src="cardcatalog-core.js"></script>
<script>
/* App shell wiring for v0.1.0. All catalog logic lives in cardcatalog-core.js. */
(function () {
  "use strict";
  const CC = window.CardCatalog;

  /* Debug flag per standards: ?debug=1 */
  if (new URLSearchParams(location.search).get("debug") === "1") CC.setDebug(true);
  CC.log("shell boot", CC.APP_VERSION);

  /* Version display (diegetic lot number plus plain semver). */
  document.getElementById("verLot").textContent = "v" + CC.APP_VERSION;

  /* Side menu */
  const menu = document.getElementById("sideMenu");
  const toggle = document.getElementById("menuToggle");
  toggle.addEventListener("click", () => {
    const open = menu.classList.toggle("open");
    toggle.setAttribute("aria-expanded", String(open));
  });

  /* Theme switching, persisted. Night is the default. */
  const savedTheme = localStorage.getItem("cc.theme");
  if (savedTheme) setTheme(savedTheme);
  document.querySelectorAll("[data-theme-set]").forEach((btn) => {
    btn.addEventListener("click", () => setTheme(btn.dataset.themeSet));
  });
  function setTheme(name) {
    document.documentElement.dataset.theme = name;
    localStorage.setItem("cc.theme", name);
    document.querySelectorAll("[data-theme-set]").forEach((b) =>
      b.setAttribute("aria-pressed", String(b.dataset.themeSet === name))
    );
    CC.log("theme", name);
  }

  /* Mute toggle. No sounds exist yet in v0.1.0; the control ships first. */
  const mute = document.getElementById("muteToggle");
  let muted = localStorage.getItem("cc.muted") === "1";
  renderMute();
  mute.addEventListener("click", () => {
    muted = !muted;
    localStorage.setItem("cc.muted", muted ? "1" : "0");
    renderMute();
  });
  function renderMute() {
    mute.setAttribute("aria-pressed", String(muted));
    mute.textContent = muted ? "Sound off" : "Sound on";
  }

  /* Drawers: open the (empty) interior view. */
  const view = document.getElementById("drawerView");
  const nameEl = document.getElementById("drawerName");
  document.querySelectorAll(".drawer").forEach((d) => {
    d.addEventListener("click", () => {
      nameEl.textContent = d.dataset.drawer + " DRAWER";
      view.classList.add("open");
      view.scrollIntoView({ behavior: "smooth", block: "nearest" });
      CC.log("drawer open", d.dataset.drawer);
    });
  });
  document.getElementById("drawerClose").addEventListener("click", () => view.classList.remove("open"));

  /* Export: real even at v0.1.0, so the envelope shape is exercised early. */
  document.getElementById("exportBtn").addEventListener("click", () => {
    const meta = { nextAccession: 1, customDrawers: [] }; // storage layer arrives in v0.2
    const payload = CC.buildExport(meta, [], new Date().toISOString());
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "card-catalog-export.json";
    a.click();
    URL.revokeObjectURL(a.href);
  });

  /* Import stub: file picker wired, ingestion arrives with the storage layer. */
  document.getElementById("importBtn").addEventListener("click", () => {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = "application/json";
    input.addEventListener("change", () => {
      CC.log("import selected", input.files[0] && input.files[0].name);
      alert("Import arrives with the storage layer in v0.2. File was not read.");
    });
    input.click();
  });
})();
</script>
</body>
</html>
